name: menta_ray
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  flutter_overlay_window: ^0.5.0
  http: ^1.6.0
  provider: ^6.1.2
  audioplayers: ^5.2.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  animate_do: ^4.2.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

